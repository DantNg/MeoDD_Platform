; PlatformIO Project Configuration File
;
; Nen tang LVGL da board. Moi board = 1 env ke thua [common], chi doi BOARD_*,
; feature macro va partition. Them board moi = them 1 env + 1 class IBoard.

[platformio]
src_dir = src
boards_dir = .
default_envs = crowpanel_s3

; ----------------------------------------------------------------------------
; Cau hinh chung cho moi board (flag + lib + monitor). Env ben duoi ke thua.
; LUU Y: option nao env DINH NGHIA LAI se thay the -> dung ${common.x} de noi tiep.
; ----------------------------------------------------------------------------
[common]
platform = espressif32
framework = arduino
build_flags =
	-D LV_LVGL_H_INCLUDE_SIMPLE
	-D LV_CONF_INCLUDE_SIMPLE
	-D LV_CONF_KCONFIG_EXTERNAL_INCLUDE=\"lv_conf_kconfig_stub.h\"
	-I./include
	-I./src
build_unflags =
lib_deps =
	lvgl/lvgl@8.3.6
	lovyan03/LovyanGFX@^1.1.12
	bblanchon/ArduinoJson@^7.0.4
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; ----------------------------------------------------------------------------
; Board THAT: CrowPanel ESP32-S3 5.0" (RGB parallel 800x480 + GT911 I2C)
; ----------------------------------------------------------------------------
[env:crowpanel_s3]
extends = common
board = esp32-s3-devkitc-1-myboard
build_flags =
	${common.build_flags}
	-D BOARD_CROWPANEL_S3
	-D BOARD_HAS_PSRAM
	-D FEATURE_OTA=0
	-D DRIVER_GT911=1
lib_deps =
	${common.lib_deps}
	tamctec/TAMC_GT911
board_build.partitions = partitions_default.csv
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_upload.flash_size = 4MB

; ----------------------------------------------------------------------------
; Board MAU (compile-only, chua test phan cung): ESP32-C3 + ILI9341 SPI + XPT2046
; Khong PSRAM -> draw-buffer nam o RAM noi bo (cau hinh trong LvglPort).
; ----------------------------------------------------------------------------
[env:esp32c3_ili9341]
extends = common
board = esp32-c3-devkitm-1
build_flags =
	${common.build_flags}
	-D BOARD_ESP32C3_ILI9341
	-D FEATURE_BLE=0
; Partition single-app (factory 3.6MB) - app-slot mac dinh cua C3 (1.28MB) qua nho.
board_build.partitions = partitions_default.csv
